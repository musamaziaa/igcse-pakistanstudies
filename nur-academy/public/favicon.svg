<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded rectangle background for a modern app icon look -->
  <rect width="32" height="32" rx="7" fill="#020617"/>
  
  <!-- Outer Glow -->
  <circle cx="16" cy="13" r="10" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Rays of Light ("Nur") -->
  <g stroke="url(#ray-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <line x1="16" y1="6" x2="16" y2="4" />
    <line x1="21" y1="8" x2="23" y2="6" />
    <line x1="23" y1="13" x2="25" y2="13" />
    <line x1="21" y1="18" x2="23" y2="20" />
    <line x1="11" y1="8" x2="9" y2="6" />
    <line x1="9" y1="13" x2="7" y2="13" />
    <line x1="11" y1="18" x2="9" y2="20" />
  </g>

  <!-- Stylized Star / Spark of Knowledge -->
  <path d="M16 7.5L17.8 11.2L21.5 12L18.7 14.5L19.5 18.5L16 16.5L12.5 18.5L13.3 14.5L10.5 12L14.2 11.2L16 7.5Z" fill="url(#gold-grad)"/>

  <!-- Open Book representing Islamiyat / Pakistan Studies (Knowledge) -->
  <path d="M7 21.5C11 19.5 14.5 21.5 16 22.5C17.5 21.5 21 19.5 25 21.5V17C21 15 17.5 17 16 18C14.5 17 11 15 7 17V21.5Z" fill="url(#book-grad)" stroke="#047857" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M16 18V22.5" stroke="#047857" stroke-width="0.75"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-grad" x1="10.5" y1="7.5" x2="21.5" y2="18.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="book-grad" x1="7" y1="16" x2="25" y2="22.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="ray-grad" x1="16" y1="4" x2="16" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
</svg>
